<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTQP04 Study App — Exam: March 10</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

  /* Grid noise background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 60%),
                      radial-gradient(circle at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* Header */
  header { padding: 32px 0 20px; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .exam-badge {
    background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.05));
    border: 1px solid rgba(245,158,11,0.4);
    color: var(--accent3);
    font-family: var(--font-mono); font-size: 0.75rem;
    padding: 6px 14px; border-radius: 20px;
    animation: pulse-badge 2s ease-in-out infinite;
  }
  @keyframes pulse-badge { 0%,100% { opacity:1 } 50% { opacity:0.7 } }
  .subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 6px; font-family: var(--font-mono); }

  /* Nav tabs */
  .nav { display: flex; gap: 4px; margin: 24px 0 0; flex-wrap: wrap; }
  .nav-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font-body); font-size: 0.82rem; font-weight: 500;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Sections */
  .section { display: none; padding: 28px 0 60px; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform: none } }

  /* Topic Grid */
  .section-title { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .topic-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .topic-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 12px 12px 0 0;
  }
  .topic-card:nth-child(1)::before { background: #7c3aed; }
  .topic-card:nth-child(2)::before { background: #06b6d4; }
  .topic-card:nth-child(3)::before { background: #f59e0b; }
  .topic-card:nth-child(4)::before { background: #10b981; }
  .topic-card:nth-child(5)::before { background: #ef4444; }
  .topic-card:nth-child(6)::before { background: #8b5cf6; }
  .topic-card:nth-child(7)::before { background: #0ea5e9; }
  .topic-card:nth-child(8)::before { background: #f97316; }
  .topic-card:nth-child(9)::before { background: #14b8a6; }
  .topic-card:nth-child(10)::before { background: #a855f7; }
  .topic-card:nth-child(11)::before { background: #ec4899; }
  .topic-card:nth-child(12)::before { background: #22c55e; }
  .topic-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
  .topic-num { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
  .topic-name { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; line-height: 1.3; }
  .topic-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .tag { background: rgba(255,255,255,0.05); font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; color: var(--muted); font-family: var(--font-mono); }

  /* Flashcards */
  .fc-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .fc-select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-body); font-size: 0.85rem; padding: 8px 14px;
    border-radius: 8px; cursor: pointer; flex: 1; min-width: 180px;
  }
  .fc-progress { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); }
  .flashcard-wrap { perspective: 1200px; height: 280px; margin-bottom: 20px; cursor: pointer; }
  .flashcard {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
    border-radius: 16px;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 16px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; padding: 30px;
    text-align: center; border: 1px solid var(--border);
  }
  .fc-front { background: linear-gradient(135deg, var(--card), rgba(124,58,237,0.08)); }
  .fc-back { background: linear-gradient(135deg, var(--card), rgba(6,182,212,0.08)); transform: rotateY(180deg); }
  .fc-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .fc-content { font-size: 1.05rem; line-height: 1.6; color: var(--text); }
  .fc-hint { font-size: 0.75rem; color: var(--muted); margin-top: 16px; }
  .fc-nav { display: flex; gap: 10px; justify-content: center; }
  .btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
    padding: 9px 20px; border-radius: 8px; cursor: pointer; transition: all 0.18s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #6d28d9; }
  .btn.success { background: rgba(16,185,129,0.15); border-color: var(--green); color: var(--green); }
  .btn.danger { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

  /* MCQ */
  .mcq-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .mcq-meta { display: flex; justify-content: space-between; margin-bottom: 14px; }
  .mcq-topic-badge { font-family: var(--font-mono); font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .mcq-q { font-size: 1rem; font-weight: 500; line-height: 1.6; margin-bottom: 18px; }
  .mcq-options { display: grid; gap: 8px; }
  .mcq-opt {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 16px; cursor: pointer; font-size: 0.88rem; transition: all 0.18s;
    text-align: left; color: var(--text); font-family: var(--font-body);
    display: flex; align-items: flex-start; gap: 10px;
  }
  .mcq-opt-key { font-family: var(--font-mono); font-weight: 500; color: var(--muted); min-width: 18px; }
  .mcq-opt:hover:not(:disabled) { border-color: var(--accent); }
  .mcq-opt.correct { background: rgba(16,185,129,0.12); border-color: var(--green); color: var(--green); }
  .mcq-opt.wrong { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }
  .mcq-explanation { margin-top: 14px; padding: 12px 16px; background: rgba(6,182,212,0.06); border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0; font-size: 0.85rem; line-height: 1.6; color: #94a3b8; display: none; }
  .mcq-score-bar { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; }
  .score-num { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; color: var(--accent); }
  .score-label { font-size: 0.8rem; color: var(--muted); }
  .progress-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s; }

  /* Summary */
  .summary-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .sum-topic-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font-mono); font-size: 0.72rem; padding: 6px 12px;
    border-radius: 6px; cursor: pointer; transition: all 0.18s;
  }
  .sum-topic-btn:hover, .sum-topic-btn.active { border-color: var(--accent2); color: var(--accent2); }
  .summary-content { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .sum-title { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .key-point { background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; }
  .key-point-label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--accent3); letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
  .key-point-text { font-size: 0.88rem; line-height: 1.6; }
  .formula-box { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); border-radius: 8px; padding: 10px 14px; margin: 6px 0; font-family: var(--font-mono); font-size: 0.82rem; color: #c4b5fd; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }
  .compare-item { background: var(--surface); border-radius: 8px; padding: 12px; }
  .compare-head { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .compare-list { font-size: 0.82rem; line-height: 1.8; color: #94a3b8; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .chip { display: inline-block; background: rgba(124,58,237,0.15); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.25); font-family: var(--font-mono); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin: 2px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <div>
        <div class="logo">MTQP04 <span>Study</span></div>
        <div class="subtitle">Data Science · AI · Cyber Security · 12 Topics · 75 Questions</div>
      </div>
      <div class="exam-badge">⚡ Exam: March 10, 2026</div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="showSection('overview')">📚 Topics</button>
      <button class="nav-btn" onclick="showSection('flashcards')">🃏 Flashcards</button>
      <button class="nav-btn" onclick="showSection('mcq')">✏️ MCQ Practice</button>
      <button class="nav-btn" onclick="showSection('summary')">📋 Key Points</button>
    </div>
  </header>

  <!-- OVERVIEW -->
  <div class="section active" id="overview">
    <div class="section-title">All 12 Topics</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>

  <!-- FLASHCARDS -->
  <div class="section" id="flashcards">
    <div class="section-title">Flashcard Drill</div>
    <div class="fc-controls">
      <select class="fc-select" id="fcTopicSelect" onchange="loadFlashcards()">
        <option value="all">All Topics</option>
      </select>
      <span class="fc-progress" id="fcProgress">Card 1 of 1</span>
      <button class="btn" onclick="shuffleCards()">🔀 Shuffle</button>
    </div>
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="fc-face fc-front">
          <div class="fc-label">Question</div>
          <div class="fc-content" id="fcFront">Loading...</div>
          <div class="fc-hint">Tap to reveal answer</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">Answer</div>
          <div class="fc-content" id="fcBack"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn danger" onclick="nextCard(-1)">← Prev</button>
      <button class="btn primary" onclick="flipCard()">Flip Card</button>
      <button class="btn success" onclick="nextCard(1)">Next →</button>
    </div>
  </div>

  <!-- MCQ -->
  <div class="section" id="mcq">
    <div class="section-title">MCQ Practice</div>
    <div class="mcq-score-bar">
      <div><div class="score-num" id="scoreNum">0</div><div class="score-label">correct</div></div>
      <div><div class="score-num" id="totalNum" style="color:var(--muted)">0</div><div class="score-label">attempted</div></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <button class="btn" onclick="resetMCQ()">Reset</button>
    </div>
    <div id="mcqContainer"></div>
    <button class="btn primary" onclick="loadMoreMCQ()" style="margin-top:8px">Load More Questions</button>
  </div>

  <!-- SUMMARY -->
  <div class="section" id="summary">
    <div class="section-title">Topic Key Points</div>
    <div class="summary-nav" id="summaryNav"></div>
    <div class="summary-content" id="summaryContent"></div>
  </div>
</div>

<script>
const topics = [
  { num:1, name:"Set Theory & Algebra", tags:["Sets","Relations","Functions","Groups","Boolean"] },
  { num:2, name:"Theory of Computations", tags:["DFA","NFA","CFG","PDA","Turing"] },
  { num:3, name:"Digital Logic", tags:["Binary","K-Map","Flip-Flops","ADC/DAC"] },
  { num:4, name:"Computer Architecture", tags:["Pipelining","Cache","DMA","Addressing"] },
  { num:5, name:"Microprocessors", tags:["8085","Interrupts","8255 PPI","Assembly"] },
  { num:6, name:"Data Structures", tags:["Stack","Queue","BST","Heaps","Trees"] },
  { num:7, name:"Algorithms", tags:["Big-O","DP","Greedy","Sorting","Graphs"] },
  { num:8, name:"Operating Systems", tags:["Deadlock","Scheduling","Paging","Threads"] },
  { num:9, name:"Computer Networks", tags:["OSI","TCP/UDP","Routing","Cryptography"] },
  { num:10, name:"Artificial Intelligence", tags:["A*","BFS/DFS","Agents","FOL"] },
  { num:11, name:"Cryptography", tags:["CIA Triad","Caesar","Playfair","RSA"] },
  { num:12, name:"Data Science", tags:["ML","K-Means","Regression","Preprocessing"] },
];

// Render topic grid
const grid = document.getElementById('topicGrid');
topics.forEach(t => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.innerHTML = `<div class="topic-num">TOPIC ${t.num}</div>
    <div class="topic-name">${t.name}</div>
    <div class="topic-tags">${t.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div>`;
  card.onclick = () => { showSection('flashcards'); document.getElementById('fcTopicSelect').value = t.num; loadFlashcards(); };
  grid.appendChild(card);
});

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = ['overview','flashcards','mcq','summary'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (id === 'flashcards' && allCards.length === 0) loadFlashcards();
  if (id === 'mcq' && mcqData.length === 0) initMCQ();
  if (id === 'summary') initSummary();
}

// ============ FLASHCARDS ============
const flashcardData = {
  1: [
    {q:"What is the Power Set of A = {1,2,3}? How many elements?", a:"P(A) = {∅,{1},{2},{3},{1,2},{1,3},{2,3},{1,2,3}} → 8 elements (2³). Formula: |P(A)| = 2ⁿ"},
    {q:"State De Morgan's Laws for Sets", a:"(A∪B)' = A'∩B'  AND  (A∩B)' = A'∪B'\n\nComplement of union = intersection of complements."},
    {q:"What is an Equivalence Relation? 3 conditions.", a:"1. Reflexive: aRa\n2. Symmetric: aRb ⟹ bRa\n3. Transitive: aRb and bRc ⟹ aRc\n\nExample: 'same birth year' on people"},
    {q:"Four axioms of a Group (G, *)", a:"1. Closure: a*b ∈ G\n2. Associativity: (a*b)*c = a*(b*c)\n3. Identity: ∃e: a*e = e*a = a\n4. Inverse: ∃a⁻¹: a*a⁻¹ = e"},
    {q:"What is a Bijective function?", a:"Both Injective (one-to-one) AND Surjective (onto).\n• Injective: f(a₁)=f(a₂) ⟹ a₁=a₂\n• Surjective: Range = Codomain\nBijective functions have an inverse."},
    {q:"Boolean Absorption Laws", a:"A + A·B = A\nA · (A+B) = A\n\nAlso: De Morgan's: (A+B)' = A'·B'"},
    {q:"What is a Partial Order? Give example.", a:"Reflexive + Antisymmetric + Transitive\n\nExample: Divisibility on positive integers (a|b). A POSET with a Hasse diagram."},
    {q:"Symmetric Difference A △ B = ?", a:"A △ B = (A−B) ∪ (B−A)\n= Elements in A or B, but NOT both\nExample: {1,2,3} △ {3,4,5} = {1,2,4,5}"},
  ],
  2: [
    {q:"DFA is defined as 5-tuple: M = ?", a:"M = (Q, Σ, δ, q₀, F)\n• Q: Finite states\n• Σ: Input alphabet\n• δ: Q×Σ→Q (transition)\n• q₀: Start state\n• F: Accepting states"},
    {q:"Key difference: DFA vs NFA", a:"DFA: Exactly ONE transition per (state, symbol).\nNFA: MULTIPLE transitions allowed + ε-transitions.\n\nPower: EQUAL — both recognize Regular Languages!"},
    {q:"Pumping Lemma for Regular Languages — state it.", a:"∀ regular L, ∃ pumping length p s.t. any s∈L with |s|≥p:\ns = xyz where:\n• |y| ≥ 1\n• |xy| ≤ p\n• xyⁱz ∈ L for all i ≥ 0\nUsed to PROVE languages are NOT regular."},
    {q:"What is Chomsky Normal Form (CNF)?", a:"Every production is EITHER:\n• A → BC (two variables)\n• A → a (single terminal)\nEvery CFG can be converted to CNF. Basis for CYK parsing (O(n³))."},
    {q:"Mealy vs Moore Machine", a:"Mealy: Output depends on STATE + INPUT (output on transition).\nMoore: Output depends only on STATE (output on entry).\nBoth equivalent, Moore may need more states."},
    {q:"Halting Problem — why undecidable?", a:"No TM can decide for all (M,w) whether TM M halts on w.\nProof by contradiction: Assume H decides halting, build D that calls H(D,D) and does opposite → contradiction.\nProven by Turing, 1936."},
    {q:"What does a PDA add over a DFA?", a:"A STACK (infinite memory, LIFO).\nPDA recognizes Context-Free Languages.\nPDA = 7-tuple: (Q, Σ, Γ, δ, q₀, Z₀, F)\nΓ = stack alphabet, Z₀ = initial stack symbol."},
    {q:"Kleene Star R* means what?", a:"Zero or more repetitions of R.\nR* = {ε, R, RR, RRR, ...}\nR+ = RR* = one or more repetitions\nR? = R|ε = zero or one occurrence"},
  ],
  3: [
    {q:"Convert (45)₁₀ to binary", a:"45÷2=22R1, 22÷2=11R0, 11÷2=5R1, 5÷2=2R1, 2÷2=1R0, 1÷2=0R1\n→ Reading remainders bottom-up: (101101)₂\nVerify: 32+8+4+1 = 45 ✓"},
    {q:"How to represent -45 in 8-bit 2's Complement?", a:"45 = 00101101\n1's complement = 11010010\nAdd 1 → 11010011\nVerify: -128+64+16+2+1 = -45 ✓\nRange of 8-bit 2's comp: -128 to +127"},
    {q:"Why is NAND a Universal Gate?", a:"Any function can be built from NAND alone:\n• NOT A = A NAND A\n• A AND B = (A NAND B) NAND (A NAND B)\n• A OR B = (A NAND A) NAND (B NAND B)\nNOR is also universal."},
    {q:"JK Flip-Flop truth table", a:"J=0, K=0 → Q (No change)\nJ=0, K=1 → 0 (Reset)\nJ=1, K=0 → 1 (Set)\nJ=1, K=1 → Q' (Toggle)\nFixes the undefined state of SR flip-flop."},
    {q:"Nyquist Sampling Theorem", a:"Sample rate ≥ 2 × signal frequency\nTo avoid aliasing (signal distortion).\nExample: Audio at 20kHz → sample at ≥ 40kHz.\nCD quality: 44.1 kHz sampling rate."},
    {q:"K-Map: what do groups of 4 do?", a:"Groups of 4 (2²) eliminate 2 variables.\nGroups of 2 → eliminate 1 variable.\nGroups of 8 → eliminate 3 variables.\nWrap-around IS allowed (edges are adjacent)."},
    {q:"Full Adder equations", a:"Sum = A ⊕ B ⊕ Cin\nCout = AB + BCin + ACin\n(Half Adder: Sum=A⊕B, Carry=A·B, no Cin)"},
    {q:"What is (255)₁₀ in hex and binary?", a:"Binary: 11111111 (all 8 bits set)\nHex: FF\nOctal: 377\nVerify: 16×15+15 = 255 ✓"},

let allCards = [];
let currentIdx = 0;
let isFlipped = false;

function loadFlashcards() {
  const val = document.getElementById('fcTopicSelect').value;
  if (val === 'all') {
    allCards = Object.values(flashcardData).flat();
  } else {
    allCards = flashcardData[val] || [];
  }
  currentIdx = 0;
  isFlipped = false;
  showCard();
}

function showCard() {
  if (!allCards.length) return;
  const card = allCards[currentIdx];
  document.getElementById('fcFront').textContent = card.q;
  document.getElementById('fcBack').style.whiteSpace = 'pre-line';
  document.getElementById('fcBack').textContent = card.a;
  document.getElementById('fcProgress').textContent = `Card ${currentIdx+1} of ${allCards.length}`;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  isFlipped = false;
}

function flipCard() {
  const fc = document.getElementById('flashcard');
  isFlipped = !isFlipped;
  fc.classList.toggle('flipped', isFlipped);
}

function nextCard(dir) {
  currentIdx = (currentIdx + dir + allCards.length) % allCards.length;
  showCard();
}

function shuffleCards() {
  allCards = allCards.sort(() => Math.random() - 0.5);
  currentIdx = 0;
  showCard();
}

let mcqScore = 0, mcqTotal = 0;
let loadedMCQ = 0;

function initMCQ() {
  mcqScore = 0; mcqTotal = 0; loadedMCQ = 0;
  document.getElementById('mcqContainer').innerHTML = '';
  loadMoreMCQ();
}

function loadMoreMCQ() {
  const container = document.getElementById('mcqContainer');
  const batch = mcqBank.slice(loadedMCQ, loadedMCQ + 6);
  batch.forEach((q, i) => {
    const idx = loadedMCQ + i;
    const div = document.createElement('div');
    div.className = 'mcq-card';
    div.id = `mcq-${idx}`;
    div.innerHTML = `
      <div class="mcq-meta">
        <span class="mcq-topic-badge">${q.topic}</span>
        <span style="font-family:var(--font-mono);font-size:0.72rem;color:var(--muted)">Q${idx+1}</span>
      </div>
      <div class="mcq-q">${q.q}</div>
      <div class="mcq-options">
        ${q.opts.map((opt,j) => `
          <button class="mcq-opt" onclick="selectOpt(${idx},${j})" id="opt-${idx}-${j}">
            <span class="mcq-opt-key">${['A','B','C','D'][j]}</span>${opt}
          </button>`).join('')}
      </div>
      <div class="mcq-explanation" id="exp-${idx}">💡 ${q.exp}</div>
    `;
    container.appendChild(div);
  });
  loadedMCQ += batch.length;
  if (loadedMCQ >= mcqBank.length) {
    document.querySelector('[onclick="loadMoreMCQ()"]').style.display = 'none';
  }
}

function selectOpt(qIdx, optIdx) {
  const q = mcqBank[qIdx];
  const opts = document.querySelectorAll(`#mcq-${qIdx} .mcq-opt`);
  opts.forEach(o => o.disabled = true);
  if (optIdx === q.ans) {
    opts[optIdx].classList.add('correct');
    mcqScore++;
  } else {
    opts[optIdx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
  }
  mcqTotal++;
  document.getElementById(`exp-${qIdx}`).style.display = 'block';
  document.getElementById('scoreNum').textContent = mcqScore;
  document.getElementById('totalNum').textContent = mcqTotal;
  const pct = mcqTotal > 0 ? (mcqScore/mcqTotal*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetMCQ() {
  mcqScore = 0; mcqTotal = 0; loadedMCQ = 0;
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('totalNum').textContent = '0';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('mcqContainer').innerHTML = '';
  document.querySelector('[onclick="loadMoreMCQ()"]').style.display = 'block';
  loadMoreMCQ();
}
